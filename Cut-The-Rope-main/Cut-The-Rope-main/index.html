<body class="ctrCursor">

    <style type="text/css">
        /* Lock the body to prevent scrolling/bouncing */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Keep the game at its native internal resolution */
        #gameContainer {
            width: 1024px !important;
            height: 768px !important;
            position: relative;
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* Fix the Menu/UI overlapping glitch */
        .panel, #gameArea, #c, #levelCanvas {
            width: 1024px !important;
            height: 768px !important;
            position: absolute !important;
            top: 0;
            left: 0;
        }

        /* Hide the annoying horizontal scroll if any */
        #lang { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>

    <script type="text/javascript">
        // This script calculates the perfect scale to fit your window
        // without breaking the "click" positions.
        function resizeGame() {
            var container = document.getElementById('gameContainer');
            var width = window.innerWidth;
            var height = window.innerHeight;
            var ratio = width / height;
            var gameRatio = 1024 / 768;
            var scale;

            if (ratio > gameRatio) {
                scale = height / 768;
            } else {
                scale = width / 1024;
            }

            container.style.transform = 'scale(' + scale + ')';
        }

        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', resizeGame);
    </script>
